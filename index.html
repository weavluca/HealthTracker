<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Health Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Sidebar Nav -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-mark">H</span>
      <span class="logo-text">HealthOS</span>
    </div>
    <nav class="nav">
      <a href="index.html" class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="meals.html" class="nav-item" data-page="meals">
        <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        Meals
      </a>
      <a href="workouts.html" class="nav-item" data-page="workouts">
        <svg viewBox="0 0 24 24"><path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>
        Workouts
      </a>
      <a href="habits.html" class="nav-item" data-page="habits">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Habits & Mood
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="today-date"></span>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <header class="topbar">
      <h1 class="page-title">Dashboard</h1>
      <div class="topbar-actions">
        <span class="streak-badge" id="streak-badge">🔥 <span id="streak-count">0</span> day streak</span>
      </div>
    </header>

    <section class="dashboard-grid">

      <!-- Today's Summary Card -->
      <div class="card card--wide">
        <div class="card-header">
          <h2>Today at a Glance</h2>
          <span class="card-date" id="glance-date"></span>
        </div>
        <div class="glance-stats">
          <div class="stat">
            <span class="stat-value" id="stat-meals">0/3</span>
            <span class="stat-label">Meals Logged</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-workouts">0</span>
            <span class="stat-label">Workouts Done</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-habits">0%</span>
            <span class="stat-label">Habits Complete</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-mood">—</span>
            <span class="stat-label">Mood Today</span>
          </div>
        </div>
      </div>

      <!-- Quick Log -->
      <div class="card">
        <div class="card-header"><h2>Quick Log</h2></div>
        <div class="quick-log-list" id="quick-log-list">
          <p class="empty-state">Nothing logged yet today. Use the sections to get started!</p>
        </div>
      </div>

      <!-- Weekly Progress -->
      <div class="card">
        <div class="card-header"><h2>This Week</h2></div>
        <div class="week-bars" id="week-bars">
          <!-- Rendered by JS -->
        </div>
      </div>

    </section>
  </main>

  <script src="app.js"></script>
  <script>
    // Dashboard-specific logic
    const today = new Date();
    document.getElementById('today-date').textContent = today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    document.getElementById('glance-date').textContent = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    function updateDashboard() {
      const todayKey = today.toISOString().split('T')[0];
      const meals = JSON.parse(localStorage.getItem('meals') || '[]').filter(m => m.date === todayKey);
      const workouts = JSON.parse(localStorage.getItem('workouts') || '[]').filter(w => w.date === todayKey);
      const habits = JSON.parse(localStorage.getItem('habits') || '[]');
      const todayHabits = habits.filter(h => h.date === todayKey);
      const mood = JSON.parse(localStorage.getItem('moods') || '[]').find(m => m.date === todayKey);

      document.getElementById('stat-meals').textContent = meals.length + '/3';
      document.getElementById('stat-workouts').textContent = workouts.length;

      const habitNames = [...new Set(habits.map(h => h.name))];
      const completedHabits = todayHabits.length;
      const total = habitNames.length || 1;
      document.getElementById('stat-habits').textContent = Math.round((completedHabits / total) * 100) + '%';

      const moodEmoji = { great: '😄', good: '🙂', okay: '😐', tired: '😴', bad: '😔' };
      document.getElementById('stat-mood').textContent = mood ? moodEmoji[mood.mood] || mood.mood : '—';

      // Quick log
      const logEl = document.getElementById('quick-log-list');
      const allLogs = [
        ...meals.map(m => ({ time: m.time, label: `🥗 ${m.name}`, type: 'meal' })),
        ...workouts.map(w => ({ time: w.time, label: `💪 ${w.name}`, type: 'workout' })),
        ...todayHabits.map(h => ({ time: h.time, label: `✅ ${h.name}`, type: 'habit' })),
      ].sort((a, b) => (a.time || '').localeCompare(b.time || ''));

      logEl.innerHTML = allLogs.length
        ? allLogs.map(l => `<div class="log-item log-item--${l.type}"><span class="log-time">${l.time || ''}</span><span>${l.label}</span></div>`).join('')
        : '<p class="empty-state">Nothing logged yet today.</p>';

      // Week bars
      renderWeekBars();
      updateStreak();
    }

    function renderWeekBars() {
      const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const now = new Date();
      const dayOfWeek = (now.getDay() + 6) % 7; // Mon=0
      const el = document.getElementById('week-bars');
      el.innerHTML = days.map((d, i) => {
        const date = new Date(now);
        date.setDate(now.getDate() - dayOfWeek + i);
        const key = date.toISOString().split('T')[0];
        const meals = JSON.parse(localStorage.getItem('meals') || '[]').filter(m => m.date === key).length;
        const workouts = JSON.parse(localStorage.getItem('workouts') || '[]').filter(w => w.date === key).length;
        const filled = meals > 0 || workouts > 0;
        const isToday = i === dayOfWeek;
        return `<div class="week-bar-col ${isToday ? 'today' : ''}">
          <div class="week-bar-fill" style="height:${Math.min(100, (meals + workouts) * 20)}%"></div>
          <span class="week-bar-label">${d}</span>
        </div>`;
      }).join('');
    }

    function updateStreak() {
      const meals = JSON.parse(localStorage.getItem('meals') || '[]');
      const workouts = JSON.parse(localStorage.getItem('workouts') || '[]');
      const allDates = [...new Set([...meals.map(m => m.date), ...workouts.map(w => w.date)])].sort().reverse();
      let streak = 0;
      let check = new Date();
      for (let i = 0; i < 30; i++) {
        const key = check.toISOString().split('T')[0];
        if (allDates.includes(key)) { streak++; check.setDate(check.getDate() - 1); }
        else break;
      }
      document.getElementById('streak-count').textContent = streak;
    }

    updateDashboard();
  </script>
</body>
</html>
