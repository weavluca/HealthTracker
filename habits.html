<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Habits & Mood · HealthOS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><span class="logo-mark">H</span><span class="logo-text">ealthOS</span></div>
    <nav class="nav">
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard
      </a>
      <a href="meals.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Meals
      </a>
      <a href="workouts.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>Workouts
      </a>
      <a href="habits.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Habits & Mood
      </a>
    </nav>
    <div class="sidebar-footer"><span id="today-date"></span></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 class="page-title">Habits & Mood</h1>
      <button class="btn btn--primary" onclick="openModal('habit-modal')">+ Add Habit</button>
    </header>

    <section class="dashboard-grid">

      <!-- Mood Check-In -->
      <div class="card">
        <div class="card-header"><h2>Today's Mood</h2></div>
        <div class="mood-grid" id="mood-grid">
          <button class="mood-btn" data-mood="great" onclick="logMood('great')">😄<span>Great</span></button>
          <button class="mood-btn" data-mood="good" onclick="logMood('good')">🙂<span>Good</span></button>
          <button class="mood-btn" data-mood="okay" onclick="logMood('okay')">😐<span>Okay</span></button>
          <button class="mood-btn" data-mood="tired" onclick="logMood('tired')">😴<span>Tired</span></button>
          <button class="mood-btn" data-mood="bad" onclick="logMood('bad')">😔<span>Not great</span></button>
        </div>
        <div id="mood-note-section" style="display:none; margin-top:1rem;">
          <textarea id="mood-note" placeholder="How are you feeling? (optional)"></textarea>
          <button class="btn btn--primary" onclick="saveMoodNote()" style="margin-top:.5rem;">Save Note</button>
        </div>
        <div id="mood-saved" class="empty-state" style="margin-top:1rem;"></div>
      </div>

      <!-- Habits Checklist -->
      <div class="card">
        <div class="card-header"><h2>Today's Habits</h2></div>
        <div id="habits-list"></div>
      </div>

      <!-- Habit History Heatmap placeholder -->
      <div class="card card--wide">
        <div class="card-header"><h2>Recent Habit Log</h2></div>
        <div id="habit-history"></div>
      </div>

    </section>
  </main>

  <!-- Add Habit Modal -->
  <div class="modal-overlay" id="habit-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add a Habit</h3>
        <button class="modal-close" onclick="closeModal('habit-modal')">✕</button>
      </div>
      <div class="modal-body">
        <label>Habit Name<input type="text" id="habit-name" placeholder="e.g. Drink 8 glasses of water"/></label>
        <label>Category
          <select id="habit-category">
            <option value="Health">Health</option>
            <option value="Nutrition">Nutrition</option>
            <option value="Mindfulness">Mindfulness</option>
            <option value="Sleep">Sleep</option>
            <option value="Other">Other</option>
          </select>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn--ghost" onclick="closeModal('habit-modal')">Cancel</button>
        <button class="btn btn--primary" onclick="addHabit()">Add Habit</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const todayKey = new Date().toISOString().split('T')[0];
    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    let selectedMood = null;

    function logMood(mood) {
      selectedMood = mood;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      document.querySelector(`[data-mood="${mood}"]`).classList.add('selected');
      document.getElementById('mood-note-section').style.display = 'block';
    }

    function saveMoodNote() {
      if (!selectedMood) return;
      const moods = JSON.parse(localStorage.getItem('moods') || '[]').filter(m => m.date !== todayKey);
      moods.push({ mood: selectedMood, note: document.getElementById('mood-note').value, date: todayKey, time: new Date().toTimeString().slice(0,5) });
      localStorage.setItem('moods', JSON.stringify(moods));
      document.getElementById('mood-saved').textContent = '✅ Mood saved!';
      document.getElementById('mood-note-section').style.display = 'none';
    }

    // Load saved mood
    const savedMood = JSON.parse(localStorage.getItem('moods') || '[]').find(m => m.date === todayKey);
    if (savedMood) {
      document.querySelector(`[data-mood="${savedMood.mood}"]`)?.classList.add('selected');
      document.getElementById('mood-saved').textContent = `✅ Logged: ${savedMood.mood}${savedMood.note ? ' — "' + savedMood.note + '"' : ''}`;
    }

    function getHabitDefs() {
      return JSON.parse(localStorage.getItem('habit-defs') || '[]');
    }

    function addHabit() {
      const name = document.getElementById('habit-name').value.trim();
      if (!name) return alert('Please enter a habit name.');
      const defs = getHabitDefs();
      if (defs.find(h => h.name === name)) return alert('Habit already exists.');
      defs.push({ id: Date.now(), name, category: document.getElementById('habit-category').value });
      localStorage.setItem('habit-defs', JSON.stringify(defs));
      closeModal('habit-modal');
      document.getElementById('habit-name').value = '';
      renderHabits();
    }

    function toggleHabit(id, name) {
      const habits = JSON.parse(localStorage.getItem('habits') || '[]');
      const existing = habits.find(h => h.id === id && h.date === todayKey);
      if (existing) {
        const filtered = habits.filter(h => !(h.id === id && h.date === todayKey));
        localStorage.setItem('habits', JSON.stringify(filtered));
      } else {
        habits.push({ id, name, date: todayKey, time: new Date().toTimeString().slice(0,5) });
        localStorage.setItem('habits', JSON.stringify(habits));
      }
      renderHabits();
    }

    function deleteHabitDef(id) {
      if (!confirm('Remove this habit?')) return;
      let defs = getHabitDefs();
      defs = defs.filter(h => h.id !== id);
      localStorage.setItem('habit-defs', JSON.stringify(defs));
      renderHabits();
    }

    function renderHabits() {
      const defs = getHabitDefs();
      const completed = JSON.parse(localStorage.getItem('habits') || '[]').filter(h => h.date === todayKey).map(h => h.id);
      const el = document.getElementById('habits-list');

      if (!defs.length) {
        el.innerHTML = '<p class="empty-state">No habits yet. Add one with the button above!</p>';
        return;
      }

      el.innerHTML = defs.map(h => `
        <div class="habit-row ${completed.includes(h.id) ? 'habit-row--done' : ''}">
          <label class="habit-check">
            <input type="checkbox" ${completed.includes(h.id) ? 'checked' : ''} onchange="toggleHabit(${h.id}, '${h.name}')"/>
            <span class="habit-name">${h.name}</span>
            <span class="tag">${h.category}</span>
          </label>
          <button class="btn-delete" onclick="deleteHabitDef(${h.id})">✕</button>
        </div>
      `).join('');

      renderHabitHistory();
    }

    function renderHabitHistory() {
      const defs = getHabitDefs();
      const habits = JSON.parse(localStorage.getItem('habits') || '[]');
      // Last 7 days
      const days = Array.from({length: 7}, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (6-i));
        return d.toISOString().split('T')[0];
      });

      if (!defs.length) { document.getElementById('habit-history').innerHTML = '<p class="empty-state">Add habits to see history.</p>'; return; }

      const rows = defs.map(h => {
        const cells = days.map(day => {
          const done = habits.some(hh => hh.id === h.id && hh.date === day);
          const isToday = day === todayKey;
          return `<td class="heatmap-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}" title="${day}"></td>`;
        }).join('');
        return `<tr><td class="heatmap-label">${h.name}</td>${cells}</tr>`;
      }).join('');

      const headers = days.map(d => `<th>${new Date(d+'T12:00:00').toLocaleDateString('en-US', {weekday:'short'})}</th>`).join('');

      document.getElementById('habit-history').innerHTML = `
        <table class="heatmap-table">
          <thead><tr><th></th>${headers}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    renderHabits();
  </script>
</body>
</html>
